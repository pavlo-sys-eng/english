// НАЛАШТУВАННЯ КОЛЬОРІВ ДЛЯ КОЖНОГО РІВНЯ
// ═══════════════════════════════════════════════════════════════════
const LEVELS = [
  { key: "Fly 2",         color: "#4E9FFF", bg: "#EBF4FF", icon: "✈️", password: "Fly2pass"},
  { key: "Fly 3",         color: "#FF7043", bg: "#FFF0EB", icon: "🚀", password: "Fly3" },
  { key: "Fly 4",         color: "#9C6FE4", bg: "#F3EEFF", icon: "🛸", password: "fly4" },
  { key: "Wider World 1", color: "#26C6A0", bg: "#E3FBF5", icon: "🌍", password: "Wider1pass" },
  { key: "Wider World 2", color: "#FF9800", bg: "#FFF5E0", icon: "🌎", password: "Wider2pass" },
  { key: "Wider World 3", color: "#E91E8C", bg: "#FFE8F5", icon: "🌏", password: "wider3pass" },
];
// ═══════════════════════════════════════════════════════════════════
// APP STATE & LOGIC
// ═══════════════════════════════════════════════════════════════════

let currentLevel = LEVELS[0];
let currentView = 'cards';
let quizState = {};
let matchState = {};

function getWords() {
  return VOCABULARY[currentLevel.key] || [];
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

// ───────────────── RENDER NAV ─────────────────
function renderNav() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = LEVELS.map(l => `
    <button class="nav-tab${l.key === currentLevel.key ? ' active' : ''}"
      style="${l.key === currentLevel.key ? `background:${l.color};border-color:${l.color};` : ''}"
      onclick="switchLevel('${l.key}')">
      ${l.icon} ${l.key}
    </button>
  `).join('');
}

function switchLevel(key) {
  const level = LEVELS.find(l => l.key === key);
  const pass = prompt(`🔒 Введи пароль для ${key}:`);
  if (pass !== level.password) {
    alert("❌ Невірний пароль!");
    return;
  }
  currentLevel = level;
  quizState = {}; matchState = {};
  renderNav();
  renderView();
}

// ───────────────── RENDER VIEW SWITCHER ─────────────────
function renderViewSwitcher() {
  const views = [
    { id: 'cards',     label: '🃏 Картки' },
    { id: 'quiz',      label: '🎯 Вікторина' },
    { id: 'match',     label: '🔗 Матчинг' },
    { id: 'translate', label: '🔍 Переклад' },
  ];
  return `
    <div class="view-switcher">
      ${views.map(v => `
        <button class="view-btn${currentView === v.id ? ' active' : ''}"
          onclick="switchView('${v.id}')">${v.label}</button>
      `).join('')}
    </div>
  `;
}

function switchView(v) {
  currentView = v;
  quizState = {}; matchState = {};
  renderView();
}

// ───────────────── CARDS VIEW ─────────────────
function renderCards() {
  const words = getWords();
  const color = currentLevel.color;
  if (!words.length) return emptyState();
  return `
    <div class="hint-bubble">💡 Натисни на картку, щоб побачити переклад. Натисни 🔊 щоб почути слово.</div>
    <div class="cards-grid">
      ${words.map((w, i) => `
        <div class="word-card" id="card-${i}" onclick="flipCard(${i})">
          <button class="audio-btn" style="background:${color}"
            onclick="event.stopPropagation();speak('${w.en}')">🔊</button>
          <span class="emoji">${w.emoji}</span>
          <div class="en">${w.en}</div>
          <div class="ua">🇺🇦 ${w.ua}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function flipCard(i) {
  document.getElementById('card-' + i).classList.toggle('flipped');
}

// ───────────────── QUIZ VIEW ─────────────────
function initQuiz() {
  const words = getWords();
  if (words.length < 4) return;
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  quizState = {
    words: shuffled,
    current: 0,
    score: 0,
    answered: false,
    mode: Math.random() > 0.5 ? 'en2ua' : 'ua2en'
  };
}

function renderQuiz() {
  const words = getWords();
  if (words.length < 4) return `
    <div class="empty-state">
      <div class="big">🎯</div>
      <p>Потрібно мінімум 4 слова для вікторини!</p>
    </div>`;

  if (!quizState.words) initQuiz();
  const s = quizState;
  const color = currentLevel.color;

  if (s.current >= s.words.length) {
    const pct = Math.round(s.score / s.words.length * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '😊' : '📚';
    return `
      <div class="quiz-container">
        <div class="quiz-final">
          <span class="big-emoji">${emoji}</span>
          <h3>${pct >= 80 ? 'Чудово!' : pct >= 50 ? 'Непогано!' : 'Ще потренуйся!'}</h3>
          <p style="color:#888;margin-top:8px;">Правильних відповідей: <strong>${s.score}</strong> із <strong>${s.words.length}</strong> (${pct}%)</p>
          <button class="action-btn" style="background:${color}"
            onclick="quizState={};renderView()">🔄 Почати знову</button>
        </div>
      </div>`;
  }

  const w = s.words[s.current];
  const allWords = getWords();
  const wrongs = allWords.filter(x => x.en !== w.en).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...wrongs, w].sort(() => Math.random() - 0.5);
  const isEn2ua = s.mode === 'en2ua';

  return `
    <div class="quiz-container">
      <div class="quiz-progress">
        <span style="font-size:0.85rem;color:#888;font-weight:700;">${s.current + 1} / ${s.words.length}</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${(s.current/s.words.length*100)}%;background:${color}"></div>
        </div>
        <span class="quiz-score" style="color:${color}">⭐ ${s.score}</span>
      </div>

      <div class="quiz-card">
        <div class="quiz-question-label">${isEn2ua ? 'Що означає це слово?' : 'Як по-англійськи?'}</div>
        <span class="quiz-emoji">${w.emoji}</span>
        <div class="quiz-word">${isEn2ua ? w.en : w.ua}</div>
        ${isEn2ua ? `<button onclick="speak('${w.en}')" style="margin-top:8px;padding:6px 16px;border-radius:50px;border:1px solid #eee;background:#f5f5f5;cursor:pointer;font-size:0.85rem;">🔊 Почути</button>` : ''}

        <div class="quiz-options" id="quizOptions">
          ${options.map((o, i) => `
            <button class="quiz-option" id="qo-${i}"
              onclick="answerQuiz('${o.en}', '${w.en}', ${i})"
              style="border-color:#eee">
              ${isEn2ua ? o.ua : o.en}
            </button>
          `).join('')}
        </div>
      </div>

      <button class="quiz-next-btn" id="quizNext"
        style="background:${color}"
        onclick="nextQuiz()">
        ${s.current + 1 >= s.words.length ? '🏁 Результат' : 'Далі →'}
      </button>
    </div>`;
}

function answerQuiz(chosen, correct, idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const isCorrect = chosen === correct;
  if (isCorrect) quizState.score++;

  const options = document.querySelectorAll('.quiz-option');
  options.forEach((btn, i) => {
    btn.disabled = true;
    const w = quizState.words[quizState.current];
    const allWords = getWords();
    const wrongs = allWords.filter(x => x.en !== w.en).sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [...wrongs, w].sort(() => Math.random() - 0.5);
  });
  document.getElementById('qo-' + idx).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    options.forEach((btn) => {
      const isEn2ua = quizState.mode === 'en2ua';
      const w = quizState.words[quizState.current];
      if ((isEn2ua ? btn.textContent.trim() === w.ua : btn.textContent.trim() === w.en)) {
        btn.classList.add('correct');
      }
    });
  }
  if (isCorrect) speak(quizState.words[quizState.current].en);
  document.getElementById('quizNext').classList.add('show');
}

function nextQuiz() {
  quizState.current++;
  quizState.answered = false;
  quizState.mode = Math.random() > 0.5 ? 'en2ua' : 'ua2en';
  renderView();
}

// ───────────────── MATCH VIEW ─────────────────
function initMatch() {
  const words = getWords();
  const sample = [...words].sort(() => Math.random() - 0.5).slice(0, Math.min(6, words.length));
  matchState = {
    words: sample,
    enItems: [...sample].sort(() => Math.random() - 0.5),
    uaItems: [...sample].sort(() => Math.random() - 0.5),
    matched: new Set(),
    selected: null,
    selectedType: null,
    errors: 0,
    complete: false,
  };
}

function renderMatch() {
  const words = getWords();
  if (words.length < 2) return emptyState();
  if (!matchState.words) initMatch();
  const s = matchState;
  const color = currentLevel.color;

  if (s.complete) {
    return `
      <div class="match-container">
        <div class="match-result show">
          <span class="big-emoji">${s.errors === 0 ? '🏆' : '🎉'}</span>
          <h3>${s.errors === 0 ? 'Ідеально!' : 'Молодець!'}</h3>
          <p style="color:#888;margin-top:8px;">Помилок: <strong>${s.errors}</strong></p>
          <button class="action-btn" style="background:${color}"
            onclick="matchState={};renderView()">🔄 Нова гра</button>
        </div>
      </div>`;
  }

  return `
    <div class="match-container">
      <div class="hint-bubble">💡 Натисни слово зліва, потім його переклад справа, щоб з'єднати пару!</div>
      <div class="match-cols">
        <div>
          <div class="match-col-title">🇬🇧 Англійська</div>
          ${s.enItems.map((w, i) => `
            <div class="match-item${s.matched.has(w.en) ? ' matched' : ''}${s.selected === w.en && s.selectedType === 'en' ? ' selected' : ''}"
              id="men-${i}"
              onclick="matchClick('en','${w.en}',${i})">
              ${w.emoji} ${w.en}
            </div>
          `).join('')}
        </div>
        <div>
          <div class="match-col-title">🇺🇦 Українська</div>
          ${s.uaItems.map((w, i) => `
            <div class="match-item${s.matched.has(w.en) ? ' matched' : ''}${s.selected === w.en && s.selectedType === 'ua' ? ' selected' : ''}"
              id="mua-${i}"
              onclick="matchClick('ua','${w.en}',${i})">
              ${w.ua}
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function matchClick(type, key, idx) {
  const s = matchState;
  if (s.matched.has(key)) return;
  if (s.selectedType === type) {
    s.selected = key; s.selectedType = type; renderView(); return;
  }
  if (!s.selected) {
    s.selected = key; s.selectedType = type; renderView(); return;
  }
  if (s.selected === key) {
    s.matched.add(key);
    speak(s.words.find(w => w.en === key).en);
    s.selected = null; s.selectedType = null;
    if (s.matched.size === s.words.length) s.complete = true;
    renderView();
  } else {
    s.errors++;
    const el = document.getElementById((type === 'ua' ? 'mua-' : 'men-') + idx);
    if (el) { el.classList.add('wrong-flash'); setTimeout(() => el.classList.remove('wrong-flash'), 350); }
    s.selected = null; s.selectedType = null;
    setTimeout(renderView, 400);
  }
}

// ───────────────── TRANSLATE VIEW ─────────────────
function renderTranslate() {
  const words = getWords();
  return `
    <div class="translate-box">
      <div style="font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;color:#1a1a2e;margin-bottom:1rem;">
        🔍 Знайти переклад слова
      </div>
      <div class="translate-input-row">
        <input class="translate-input" id="transInput" placeholder="Введи слово (укр або англ)..."
          oninput="doTranslate()" onkeydown="if(event.key==='Enter')doTranslate()">
        <button class="translate-submit" onclick="doTranslate()">Перекласти</button>
      </div>
      <div class="translate-result" id="transResult">
        <span class="not-found">Введи слово вище для пошуку...</span>
      </div>
    </div>

    <div style="font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;color:#1a1a2e;margin-bottom:10px;">
      📋 Всі слова рівня <strong>${currentLevel.key}</strong>
    </div>
    <div class="words-list-translate">
      ${words.map(w => `
        <div class="wlt-item" onclick="speak('${w.en}')" style="cursor:pointer" title="🔊 Натисни щоб почути">
          <span class="wlt-en">${w.emoji} ${w.en}</span>
          <span class="wlt-ua">${w.ua}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function doTranslate() {
  const q = document.getElementById('transInput').value.trim().toLowerCase();
  const el = document.getElementById('transResult');
  if (!q) { el.innerHTML = '<span class="not-found">Введи слово вище для пошуку...</span>'; return; }

  // Search across ALL levels
  let found = null;
  let foundLevel = null;
  for (const lvl of LEVELS) {
    const words = VOCABULARY[lvl.key] || [];
    const match = words.find(w => w.en.toLowerCase() === q || w.ua.toLowerCase() === q || w.en.toLowerCase().includes(q) || w.ua.toLowerCase().includes(q));
    if (match) { found = match; foundLevel = lvl; break; }
  }

  if (found) {
    const isEnQuery = found.en.toLowerCase().includes(q);
    el.innerHTML = `
      <span class="match-emoji">${found.emoji}</span>
      <div>
        <div class="found" style="font-size:1.3rem;">${found.en} → ${found.ua}</div>
        <div style="font-size:0.75rem;color:#aaa;margin-top:2px;">Рівень: ${foundLevel.key}</div>
      </div>
      <button onclick="speak('${found.en}')" style="margin-left:auto;padding:6px 14px;border-radius:50px;border:1px solid #eee;background:#f5f5f5;cursor:pointer;font-size:0.85rem;">🔊</button>
    `;
  } else {
    el.innerHTML = `<span class="not-found">😕 Слово "${q}" не знайдено в словнику цього рівня</span>`;
  }
}

// ───────────────── EMPTY STATE ─────────────────
function emptyState() {
  return `
    <div class="empty-state">
      <div class="big">📝</div>
      <p>Слова для цього рівня ще не додані.</p>
      <p style="margin-top:4px;">Додай їх у розділ VOCABULARY в коді!</p>
    </div>`;
}

// ───────────────── MAIN RENDER ─────────────────
function renderView() {
  const words = getWords();
  const color = currentLevel.color;

  let content = '';
  if (currentView === 'cards') content = renderCards();
  else if (currentView === 'quiz') content = renderQuiz();
  else if (currentView === 'match') content = renderMatch();
  else if (currentView === 'translate') content = renderTranslate();

  document.getElementById('viewArea').innerHTML = `
    ${renderViewSwitcher()}
    <div class="section-top">
      <h2>${currentLevel.icon} ${currentLevel.key}</h2>
      <span class="word-count-badge" style="background:${color}">
        ${words.length} слів
      </span>
    </div>
    ${content}
  `;
}

// ───────────────── BOOT ─────────────────
renderNav();
renderView();
